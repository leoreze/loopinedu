<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoopinEdu — Resultado</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div id="appShell"></div>

  <script type="module">
    import { getJson, formatDimensionLabel, requireAuth, installShell, setShellContent, setLoadingState, escapeHtml, showToast, getToken, buildCoreMethodLegend, buildRespondentComparison, setInsightChatContext, respondentVisual, studentAvatarByGender } from '/js/app.js';

    const params = new URLSearchParams(window.location.search);
    const assessmentId = params.get('id');

    function renderList(items, icon = '•') {
      return (items || []).map((item) => `<li><span class="bullet-icon">${icon}</span><span>${escapeHtml(item)}</span></li>`).join('') || '<li><span class="bullet-icon">•</span><span>Sem dados</span></li>';
    }

    function scoreTone(score) {
      const value = Number(score || 0);
      if (value >= 4) return { label: 'Potencial elevado', icon: '🌟', text: 'Leitura muito positiva, com sinais consistentes de estabilidade e repertório.' };
      if (value >= 3) return { label: 'Faixa de equilíbrio', icon: '🟢', text: 'O estudante apresenta base funcional e pede manutenção com observação ativa.' };
      if (value >= 2) return { label: 'Atenção orientada', icon: '🟠', text: 'Há sinais relevantes de fragilidade que pedem ação coordenada entre escola e família.' };
      return { label: 'Intervenção prioritária', icon: '🔴', text: 'O resultado pede resposta imediata, alinhamento de adultos e acompanhamento próximo.' };
    }

    async function downloadPdf(url) {
      try {
        setLoadingState(true, 'Gerando arquivo para download...');
        const response = await fetch(url, { headers: { Authorization: `Bearer ${getToken()}` } });
        if (!response.ok) throw new Error('Não foi possível baixar o PDF agora.');
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = blobUrl;
        link.download = `loopinedu-relatorio-${assessmentId}.pdf`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(blobUrl);
      } catch (error) {
        showToast(error.message, 'error');
      } finally {
        setLoadingState(false);
      }
    }

    async function loadReport() {
      setLoadingState(true, 'Abrindo diagnóstico consolidado...');
      const me = await requireAuth();
      installShell({ title: 'Resultado consolidado', userName: me.full_name, user: me });

      if (!assessmentId) {
        setShellContent(`<section class="page-section"><div class="card"><h2>Nenhum diagnóstico informado</h2><p class="muted">Use /resultado.html?id=UUID para abrir um registro real.</p></div></section>`);
        setLoadingState(false);
        return;
      }

      const report = await getJson(`/reports/${assessmentId}`);
      let comparison = null;
      if (me.features?.respondent_comparison) { try { comparison = await getJson(`/assessments/${assessmentId}/comparison`); } catch {} }
      try { await getJson(`/billing/summary`); } catch {}
      const reportHtmlHref = `/api/reports/${assessmentId}/html?token=${encodeURIComponent(getToken())}`;
      const reportPdfHref = `/api/reports/${assessmentId}/pdf?token=${encodeURIComponent(getToken())}`;
      const reportPdfDownloadHref = `/api/reports/${assessmentId}/pdf?download=1&token=${encodeURIComponent(getToken())}`;
      const tone = scoreTone(report.overall_score);

      const strongest = [
        ['cognitive', Number(report.cognitive_score || 0)],
        ['organization', Number(report.organization_score || 0)],
        ['relational', Number(report.relational_score || 0)],
        ['emotional', Number(report.emotional_score || 0)]
      ].sort((a, b) => b[1] - a[1])[0]?.[0];

      const weakest = [
        ['cognitive', Number(report.cognitive_score || 0)],
        ['organization', Number(report.organization_score || 0)],
        ['relational', Number(report.relational_score || 0)],
        ['emotional', Number(report.emotional_score || 0)]
      ].sort((a, b) => a[1] - b[1])[0]?.[0];

      setShellContent(`
        <section class="page-section result-page">
          <section class="result-hero premium-result-hero">
            <div class="result-hero-grid">
              <div class="card result-identity-card">
                <div class="muted">Resultado consolidado</div>
                <div class="result-student-head">
                  ${studentAvatarByGender(report.gender, report.student_name)}
                  <div class="result-student-copy">
                    <h1 style="margin:0;">${escapeHtml(report.student_name)}</h1>
                    <div class="muted">${escapeHtml(report.school_name || 'Escola não informada')} • ${escapeHtml(report.cycle_title || 'Ciclo aberto')} • status ${escapeHtml(report.status)}</div>
                  </div>
                </div>
                <div class="score-story-card tone-${escapeHtml(tone.label.toLowerCase().replaceAll(' ', '-'))}">
                  <div class="score-story-icon">${tone.icon}</div>
                  <div>
                    <strong>${escapeHtml(tone.label)}</strong>
                    <div class="muted">${escapeHtml(tone.text)}</div>
                  </div>
                </div>
                <div class="result-action-row">
                  ${me.features?.reports_premium ? `<a id="reportLink" class="btn" href="${reportHtmlHref}" target="_blank">Abrir relatório premium</a><a class="btn secondary" href="${reportPdfHref}" target="_blank">Visualizar PDF institucional</a><button class="btn subtle" id="downloadPdfBtn" type="button">Baixar PDF</button>` : `<a class="btn" href="/billing.html">Desbloquear relatório premium</a>`}
                  ${me.features?.family_report ? `<a class="btn success" href="/api/reports/${assessmentId}/family?token=${encodeURIComponent(getToken())}" target="_blank">Devolutiva para família</a>` : ''}
                  <button id="reportGenerateBtn" class="btn" type="button">Registrar exportação</button>
                </div>
              </div>
              <div class="card result-score-card">
                <div class="result-score-shell">
                  <div class="score-ring premium-score-ring">
                    <div class="score-ring-inner">
                      <div>
                        <div class="muted">Score Geral</div>
                        <div class="result-score-value">${Number(report.overall_score || 0).toFixed(2)}</div>
                        <div class="muted result-score-band">${escapeHtml(report.overall_band || '--')}</div>
                      </div>
                    </div>
                  </div>
                  <div class="result-score-side">
                    <div class="mini-insight-card"><span>🌟</span><div><strong>Dimensão forte</strong><small>${escapeHtml(strongest ? formatDimensionLabel(strongest) : 'Sem dados')}</small></div></div>
                    <div class="mini-insight-card"><span>⚠️</span><div><strong>Ponto de atenção</strong><small>${escapeHtml(weakest ? formatDimensionLabel(weakest) : 'Sem dados')}</small></div></div>
                    <div class="mini-insight-card"><span>🧭</span><div><strong>Faixa atual</strong><small>${escapeHtml(report.overall_band || 'Sem faixa definida')}</small></div></div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section class="section">
            <div class="card">
              <div class="toolbar"><div><h2 style="margin:0;">Leitura do método C.O.R.E. 360</h2><div class="muted">Cada dimensão traz contexto visual e barra de progresso para leitura rápida do resultado.</div></div></div>
              ${buildCoreMethodLegend({
                cognitive: Number(report.cognitive_score || 0),
                organization: Number(report.organization_score || 0),
                relational: Number(report.relational_score || 0),
                emotional: Number(report.emotional_score || 0)
              })}
            </div>
          </section>

          <section class="section">
            <div class="result-context-grid compact-gap-grid">
              <div class="card">
                <h2>Resumo executivo</h2>
                <p class="muted">${escapeHtml(report.ai_summary || 'Sem resumo gerado.')}</p>
                <div class="result-context-list" style="margin-top:16px;">
                  <div class="context-pill rich-context-pill"><strong>📌 Plano de ação</strong><ul class="list-clean muted rich-bullet-list">${renderList(report.action_plan, '➡️')}</ul></div>
                </div>
              </div>
              <div class="card">
                <h2>Contexto de leitura</h2>
                <div class="result-context-list">
                  <div class="context-pill rich-context-pill"><strong>🏷️ Faixa atual</strong><span class="muted">${escapeHtml(report.overall_band || 'Sem faixa definida')}</span></div>
                  <div class="context-pill rich-context-pill"><strong>🚀 Maior força</strong><span class="muted">${escapeHtml(strongest ? formatDimensionLabel(strongest) : 'Sem dados')}</span></div>
                  <div class="context-pill rich-context-pill"><strong>🔍 Ponto de atenção</strong><span class="muted">${escapeHtml(weakest ? formatDimensionLabel(weakest) : 'Sem dados')}</span></div>
                </div>
              </div>
            </div>
          </section>

          <section class="section">
            <div class="grid-2 compact-gap-grid">
              <div class="card"><h2>Pontos fortes</h2><ul class="list-clean muted rich-bullet-list">${renderList(report.strengths, '✅')}</ul></div>
              <div class="card"><h2>Riscos com contexto</h2><ul class="list-clean muted rich-bullet-list">${renderList(report.risks, '⚠️')}</ul></div>
            </div>
          </section>

          ${comparison ? `
            <section class="section">
              <div class="card">
                <div class="toolbar"><div><h2 style="margin:0;">Comparativo entre respondentes</h2><div class="muted">Visual com avatares, barras por dimensão e cruzamento das percepções.</div></div></div>
                ${buildRespondentComparison(comparison.by_dimension || [])}
                <div class="comparison-cross-grid compact-gap-grid">
                  <div class="card comparison-table-card" style="padding:18px;">
                    <h3 style="margin-top:0;">Cruzamento comparativo</h3>
                    <div class="table-wrap"><table><thead><tr><th>Perfil</th><th>Dimensão</th><th>Média</th></tr></thead><tbody>${(comparison.by_dimension||[]).map((item)=>{ const visual = respondentVisual(item.respondent_type); return `<tr><td><div class="profile-cell"><span class="profile-avatar-chip">${visual.icon}</span><div><strong>${escapeHtml(visual.label)}</strong></div></div></td><td>${escapeHtml(formatDimensionLabel(item.dimension))}</td><td>${Number(item.average_score || 0).toFixed(2)}</td></tr>`; }).join('')}</tbody></table></div>
                  </div>
                  <div class="card comparison-comment-card" style="padding:18px;">
                    <h3 style="margin-top:0;">Comentários de contexto</h3>
                    <div class="result-context-list">
                      ${(comparison.comments || []).length ? (comparison.comments || []).map((item) => { const visual = respondentVisual(item.respondent_type); return `<div class="context-pill rich-context-pill"><strong><span class="inline-leading-icon">${visual.icon}</span>${escapeHtml(visual.label)} • ${escapeHtml(formatDimensionLabel(item.dimension))}</strong><span class="muted">${escapeHtml(item.comment)}</span></div>`; }).join('') : '<div class="empty-state">Sem comentários adicionais registrados.</div>'}
                    </div>
                  </div>
                </div>
              </div>
            </section>` : ''}
        </section>
      `);

      document.getElementById('downloadPdfBtn')?.addEventListener('click', () => downloadPdf(reportPdfDownloadHref));
      setInsightChatContext({
        context: `Resultado de ${report.student_name} com score geral ${Number(report.overall_score || 0).toFixed(2)} e faixa ${report.overall_band || 'não definida'}.`,
        suggestions: [
          'Qual o próximo passo recomendado?',
          'Como ler divergências entre respondentes?',
          'Quais dimensões merecem atenção?'
        ]
      });

      document.getElementById('reportGenerateBtn').addEventListener('click', async () => {
        setLoadingState(true, 'Registrando exportação premium...');
        try {
          const generated = await getJson(`/reports/${assessmentId}/generate`, { method: 'POST' });
          showToast(`Exportação registrada: ${generated.export.id}`);
        } catch (error) {
          if (error.code === 'FEATURE_BLOCKED') {
            showToast('Relatório premium disponível nos planos Pro e Premium.', 'error');
            window.location.href = '/billing.html';
            return;
          }
          showToast(error.message, 'error');
        } finally {
          setLoadingState(false);
        }
      });

      setLoadingState(false);
    }

    loadReport().catch((error) => {
      setLoadingState(false);
      document.body.innerHTML = `<div class="login-shell"><div class="card login-card"><h2>Falha ao carregar</h2><p class="muted">${escapeHtml(error.message)}</p></div></div>`;
    });
  </script>
</body>
</html>
