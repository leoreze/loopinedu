<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoopinEdu — Estudantes</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div id="appShell"></div>
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="card modal student-modal">
      <div class="toolbar modal-header">
        <div class="modal-copy">
          <h2 id="modalTitle" style="margin:0;">Novo estudante</h2>
          <div class="muted">Cadastro premium com validação, séries e turmas já organizadas.</div>
        </div>
        <button class="btn" type="button" id="closeModal">Fechar</button>
      </div>
      <form id="studentForm" style="margin-top:20px;">
        <input type="hidden" name="id" />
        <div class="grid-2">
          <div class="field"><label>Nome completo</label><input name="full_name" required /></div>
          <div class="field"><label>Escola</label><input name="school_name" required /></div>
          <div class="field"><label>Série</label><select name="grade_level" id="studentGradeSelect" required></select></div>
          <div class="field"><label>Turma</label><select name="class_name" id="studentClassSelect" required></select></div>
          <div class="field"><label>Data de nascimento</label><input name="birth_date" type="date" required /></div>
                    <div class="field"><label>Responsável</label><input name="guardian_name" required /></div>
          <div class="field"><label>E-mail do responsável</label><input name="guardian_email" type="email" /></div>
          <div class="field"><label>Telefone do responsável</label><input name="guardian_phone" /></div>
          <div class="field photo-upload">
            <div class="student-avatar initials" id="studentPreview">AL</div>
            <div>
              <label for="studentPhoto">Avatar do estudante</label>
              <input id="studentPhoto" type="file" accept="image/*" />
              <input type="hidden" name="photo_data_url" />
            </div>
          </div>
        </div>
        <div class="form-actions"><span class="muted">Os campos principais são obrigatórios para manter a base consistente.</span><button class="btn primary" type="submit">Salvar estudante</button></div>
      </form>
    </div>
  </div>

  <div class="modal-backdrop" id="historyModalBackdrop">
    <div class="card modal modal-wide">
      <div class="toolbar">
        <div><h2 id="historyModalTitle" style="margin:0;">Histórico por estudante</h2><div class="muted">Linha do tempo individual com leitura rápida do diagnóstico.</div></div>
        <button class="btn" type="button" id="closeHistoryModal">Fechar</button>
      </div>
      <div id="historyPanel" style="margin-top:16px;"><div class="empty-state">Selecione um estudante para ver o histórico.</div></div>
    </div>
  </div>

  <script type="module">
    import { requireAuth, installShell, setShellContent, getJson, setLoadingState, escapeHtml, showToast, buildStudentAvatar, getInitials, statusBadge } from '/js/app.js';

    const modal = document.getElementById('modalBackdrop');
    const form = document.getElementById('studentForm');
    const modalTitle = document.getElementById('modalTitle');
    const preview = document.getElementById('studentPreview');
    const photoInput = document.getElementById('studentPhoto');
    const historyModal = document.getElementById('historyModalBackdrop');
    const historyModalTitle = document.getElementById('historyModalTitle');
    let me = null;
    let students = [];
    let selectedStudentId = '';
    let searchTerm = '';
    const historyCache = new Map();

    function uniqueOptions(items, key) {
      return [...new Set(items.map((item) => item[key]).filter(Boolean))].sort((a, b) => String(a).localeCompare(String(b), 'pt-BR'));
    }

    function fillSelect(selectId, values = [], placeholder) {
      const select = document.getElementById(selectId);
      if (!select) return;
      const current = select.value;
      select.innerHTML = `<option value="">${placeholder}</option>` + values.map((value) => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`).join('');
      if (values.includes(current)) select.value = current;
    }

    function refreshCombos() {
      fillSelect('studentGradeSelect', uniqueOptions(students, 'grade_level'), 'Selecione a série');
      fillSelect('studentClassSelect', uniqueOptions(students, 'class_name'), 'Selecione a turma');
    }

    function updatePreview(name = '', photo = '') {
      preview.className = 'student-avatar';
      preview.innerHTML = photo ? `<img src="${escapeHtml(photo)}" alt="${escapeHtml(name || 'Estudante')}" />` : escapeHtml(getInitials(name));
      if (!photo) preview.classList.add('initials');
    }

    function applyFormDefaults(student = null) {
      form.school_name.value = student?.school_name || me?.tenant_name || '';
      form.grade_level.value = student?.grade_level || '';
      form.class_name.value = student?.class_name || '';
      updatePreview(student?.full_name || '', student?.photo_data_url || '');
      form.photo_data_url.value = student?.photo_data_url || '';
    }

    function openModal(student = null) {
      modal.classList.add('visible');
      form.reset();
      refreshCombos();
      form.querySelector('[name="id"]').value = student?.id || '';
      modalTitle.textContent = student ? 'Editar estudante' : 'Novo estudante';
      for (const key of ['full_name', 'grade_level', 'class_name', 'birth_date', 'school_name', 'guardian_name', 'guardian_email', 'guardian_phone']) {
        if (form[key]) form[key].value = student?.[key] || '';
      }
      applyFormDefaults(student);
    }

    function closeModal() {
      modal.classList.remove('visible');
      form.querySelectorAll('.is-invalid').forEach((field) => field.classList.remove('is-invalid'));
    }

    function getFilteredStudents() {
      const term = searchTerm.trim().toLowerCase();
      if (!term) return students;
      return students.filter((student) =>
        [student.full_name, student.grade_level, student.class_name, student.guardian_name, student.guardian_email, student.guardian_phone]
          .filter(Boolean)
          .some((value) => String(value).toLowerCase().includes(term))
      );
    }

    async function loadHistory(studentId) {
      if (!studentId) return [];
      if (!historyCache.has(studentId)) {
        const data = await getJson(`/students/${studentId}/history`);
        historyCache.set(studentId, data);
      }
      return historyCache.get(studentId) || [];
    }

    async function openHistoryModal(studentId) {
      selectedStudentId = studentId;
      const student = students.find((item) => item.id === studentId);
      const historyTarget = document.getElementById('historyPanel');
      historyModalTitle.textContent = student ? `Histórico • ${student.full_name}` : 'Histórico por estudante';
      historyModal.classList.add('visible');
      if (!student) {
        historyTarget.innerHTML = '<div class="empty-state">Selecione um estudante para ver o histórico.</div>';
        return;
      }
      historyTarget.innerHTML = '<div class="empty-state">Carregando histórico do estudante...</div>';
      const history = await loadHistory(studentId);
      historyTarget.innerHTML = `
        <div class="toolbar">
          <div class="student-meta">
            ${buildStudentAvatar(student, { className: 'large-avatar' })}
            <div>
              <h2 style="margin:0;">${escapeHtml(student.full_name)}</h2>
              <div class="muted">${escapeHtml(student.school_name || me?.tenant_name || 'Escola')} • ${escapeHtml(student.grade_level || 'Sem série')} • ${escapeHtml(student.class_name || 'Sem turma')}</div>
              <div class="muted">${escapeHtml(student.guardian_name || 'Responsável não informado')} • ${escapeHtml(student.guardian_phone || '-')}</div>
            </div>
          </div>
          <button class="btn" type="button" id="editSelectedStudent">Editar cadastro</button>
        </div>
        <div class="history-list" style="margin-top:16px;">
          ${history.length ? history.map((item) => `
            <div class="history-item">
              <strong>${escapeHtml(item.cycle_title || 'Ciclo aberto')}</strong>
              <div class="history-meta">
                <span>${statusBadge(item.status)}</span>
                <span>Score geral: <strong>${item.overall_score ?? '--'}</strong></span>
                <span>Atualizado: ${escapeHtml(item.updated_at || item.created_at || '-')}</span>
              </div>
              <div class="history-meta">
                <span>Cognitivo ${item.cognitive_score ?? '--'}</span>
                <span>Organização ${item.organization_score ?? '--'}</span>
                <span>Relacional ${item.relational_score ?? '--'}</span>
                <span>Emocional ${item.emotional_score ?? '--'}</span>
              </div>
              <div class="table-actions" style="margin-top:12px;">
                <a class="btn" href="/resultado.html?id=${item.id}">Abrir resultado</a>
              </div>
            </div>
          `).join('') : '<div class="empty-state">Este estudante ainda não possui diagnósticos registrados.</div>'}
        </div>
      `;
      document.getElementById('editSelectedStudent')?.addEventListener('click', () => {
        historyModal.classList.remove('visible');
        openModal(student);
      });
    }

    async function render() {
      installShell({ title: 'Gestão de estudantes', userName: me.full_name, user: me });
      setShellContent(`
        <section class="page-section students-page">
          <div class="summary-grid">
            <div class="summary-card"><div class="muted">Estudantes cadastrados</div><strong>${students.length}</strong></div>
            <div class="summary-card"><div class="muted">Séries mapeadas</div><strong>${uniqueOptions(students, 'grade_level').length}</strong></div>
            <div class="summary-card"><div class="muted">Turmas ativas</div><strong>${uniqueOptions(students, 'class_name').length}</strong></div>
          </div>
          <div class="card full-span-card">
            <div class="toolbar">
              <div><h2 style="margin:0;">Base de estudantes</h2><div class="muted">Cadastro padronizado, foto, validação e filtros rápidos.</div></div>
              <div class="actions"><input class="search-input" id="studentSearch" placeholder="Buscar por nome, turma, responsável ou telefone" /><button class="btn primary" id="newStudentBtn">+ Novo estudante</button></div>
            </div>
            <div class="table-wrap" style="margin-top:16px;">
              <table>
                <thead><tr><th>Estudante</th><th>Série</th><th>Turma</th><th>Responsável</th><th>Ações</th></tr></thead>
                <tbody id="studentsBody"></tbody>
              </table>
            </div>
          </div>
        </section>
      `);

      document.getElementById('newStudentBtn').addEventListener('click', () => openModal());
      document.getElementById('studentSearch').value = searchTerm;
      document.getElementById('studentSearch').addEventListener('input', async (event) => {
        searchTerm = event.target.value;
        await render();
      });

      const filtered = getFilteredStudents();
      document.getElementById('studentsBody').innerHTML = filtered.length ? filtered.map((student) => `
        <tr>
          <td>
            <div class="student-meta">
              ${buildStudentAvatar(student)}
              <div><strong>${escapeHtml(student.full_name)}</strong><div class="muted">${escapeHtml(student.guardian_email || '-')}</div></div>
            </div>
          </td>
          <td>${escapeHtml(student.grade_level || '-')}</td>
          <td>${escapeHtml(student.class_name || '-')}</td>
          <td>${escapeHtml(student.guardian_name || '-')}<div class="muted">${escapeHtml(student.guardian_phone || '-')}</div></td>
          <td><div class="table-actions"><button class="btn" data-view="${student.id}">Histórico por estudante</button><button class="btn" data-edit="${student.id}">Editar</button></div></td>
        </tr>
      `).join('') : '<tr><td colspan="5"><div class="empty-state">Nenhum estudante cadastrado ainda.</div></td></tr>';

      document.querySelectorAll('[data-edit]').forEach((button) => button.addEventListener('click', () => {
        const student = students.find((item) => item.id === button.dataset.edit);
        openModal(student);
      }));

      document.querySelectorAll('[data-view]').forEach((button) => button.addEventListener('click', async () => {
        await openHistoryModal(button.dataset.view);
      }));
    }

    async function load() {
      setLoadingState(true, 'Buscando estudantes e preparando combos inteligentes...');
      me = await requireAuth();
      students = await getJson('/students');
      refreshCombos();
      await render();
      setLoadingState(false);
    }

    photoInput.addEventListener('change', async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) {
        showToast('A imagem precisa ter até 2 MB.', 'error');
        photoInput.value = '';
        return;
      }
      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      form.photo_data_url.value = dataUrl;
      updatePreview(form.full_name.value || '', dataUrl);
    });

    form.full_name.addEventListener('input', () => updatePreview(form.full_name.value, form.photo_data_url.value));
    document.getElementById('closeModal').addEventListener('click', closeModal);
    modal.addEventListener('click', (event) => { if (event.target === modal) closeModal(); });
    document.getElementById('closeHistoryModal').addEventListener('click', () => historyModal.classList.remove('visible'));
    historyModal.addEventListener('click', (event) => { if (event.target === historyModal) historyModal.classList.remove('visible'); });

    document.getElementById('studentForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const payload = Object.fromEntries(new FormData(event.currentTarget).entries());
      const id = payload.id;
      delete payload.id;
      setLoadingState(true, id ? 'Atualizando estudante...' : 'Criando estudante...');
      try {
        await getJson(id ? `/students/${id}` : '/students', { method: id ? 'PATCH' : 'POST', body: JSON.stringify(payload) });
        showToast(id ? 'Estudante atualizado.' : 'Estudante criado.');
        closeModal();
        event.currentTarget.reset();
        photoInput.value = '';
        updatePreview('', '');
        historyCache.clear();
        await load();
      } catch (error) {
        setLoadingState(false);
        showToast(error.message, 'error');
      }
    });

    load().catch((error) => {
      setLoadingState(false);
      document.body.innerHTML = `<div class="login-shell"><div class="card login-card"><h2>Falha ao carregar</h2><p class="muted">${error.message}</p></div></div>`;
    });
  </script>
</body>
</html>
